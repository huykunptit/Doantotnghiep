<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Project Tracker — Nguyễn Quốc Huy</title>
<style>
  :root {
    --accent: #1A56DB;
    --accent-l: #EBF2FF;
    --accent-d: #1241A6;
    --success: #057A55;
    --success-l: #DEF7EC;
    --warn: #B45309;
    --warn-l: #FEF3C7;
    --danger: #C81E1E;
    --danger-l: #FDE8E8;
    --gray: #6B7280;
    --gray-l: #F9FAFB;
    --border: #E5E7EB;
    --text: #111827;
    --text2: #4B5563;
    --bg: #F3F4F6;
    --white: #FFFFFF;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* LAYOUT */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; overflow-y: auto; z-index: 100; }
  .main { margin-left: 260px; flex: 1; padding: 24px; }

  /* SIDEBAR */
  .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 15px; font-weight: 700; color: var(--accent); }
  .sidebar-header p { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .sidebar-section { padding: 8px 8px 0; }
  .sidebar-section-label { font-size: 10px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .05em; padding: 8px 8px 4px; }
  .phase-btn { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; padding: 7px 10px; border-radius: 7px; border: none; background: transparent; cursor: pointer; font-size: 13px; color: var(--text2); transition: background .15s; margin-bottom: 2px; }
  .phase-btn:hover { background: var(--accent-l); color: var(--accent); }
  .phase-btn.active { background: var(--accent-l); color: var(--accent); font-weight: 600; }
  .phase-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .phase-progress-mini { font-size: 10px; color: var(--gray); margin-left: auto; }

  /* STATS BAR */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .stat-accent { color: var(--accent); }
  .stat-success { color: var(--success); }
  .stat-warn { color: var(--warn); }

  /* PROGRESS BAR */
  .prog-bar-wrap { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; margin-top: 6px; }
  .prog-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width .4s; }
  .prog-bar-fill.green { background: var(--success); }
  .prog-bar-fill.amber { background: #D97706; }

  /* PHASE HEADER */
  .phase-header { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .phase-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .phase-title { font-size: 17px; font-weight: 700; }
  .phase-meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .phase-pct { font-size: 22px; font-weight: 700; color: var(--accent); margin-left: auto; }

  /* WEEK BLOCK */
  .week-block { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
  .week-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; user-select: none; background: var(--gray-l); border-bottom: 1px solid var(--border); }
  .week-header:hover { background: var(--accent-l); }
  .week-label { font-weight: 600; font-size: 13px; }
  .week-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .badge-pending  { background: var(--border); color: var(--gray); }
  .badge-progress { background: var(--warn-l); color: var(--warn); }
  .badge-done     { background: var(--success-l); color: var(--success); }
  .week-chevron { margin-left: auto; color: var(--gray); transition: transform .2s; font-size: 12px; }
  .week-chevron.open { transform: rotate(90deg); }
  .week-tasks { display: none; }
  .week-tasks.open { display: block; }

  /* TASK ROW */
  .task-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); transition: background .1s; }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: #FAFAFA; }
  .task-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .task-check.checked { background: var(--success); border-color: var(--success); }
  .task-check.checked::after { content: "✓"; color: white; font-size: 11px; font-weight: 700; }
  .task-body { flex: 1; }
  .task-title { font-size: 13px; color: var(--text); line-height: 1.4; }
  .task-title.done { text-decoration: line-through; color: var(--gray); }
  .task-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 1px 7px; border-radius: 99px; font-weight: 500; }
  .tag-jd  { background: #EDE9FE; color: #5B21B6; }
  .tag-be  { background: #DBEAFE; color: #1E40AF; }
  .tag-fe  { background: #D1FAE5; color: #065F46; }
  .tag-ai  { background: #FEF9C3; color: #854D0E; }
  .tag-mob { background: #FFE4E6; color: #9F1239; }
  .tag-ops { background: #F3F4F6; color: #374151; }
  .task-priority { font-size: 10px; padding: 1px 7px; border-radius: 99px; margin-left: auto; flex-shrink: 0; }
  .pri-high { background: #FDE8E8; color: var(--danger); }
  .pri-med  { background: var(--warn-l); color: var(--warn); }
  .pri-low  { background: var(--success-l); color: var(--success); }

  /* ADD TASK */
  .add-task-row { display: flex; gap: 8px; padding: 10px 16px; background: var(--gray-l); }
  .add-input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; background: var(--white); }
  .add-input:focus { outline: none; border-color: var(--accent); }
  .add-btn { padding: 6px 14px; background: var(--accent); color: white; border: none; border-radius: 7px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .add-btn:hover { background: var(--accent-d); }

  /* NOTE SECTION */
  .notes-section { margin-top: 20px; }
  .notes-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .daily-note { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .daily-note textarea { width: 100%; border: none; resize: vertical; font-size: 13px; font-family: inherit; color: var(--text); background: transparent; min-height: 80px; outline: none; line-height: 1.6; }
  .save-note-btn { margin-top: 8px; padding: 5px 14px; background: var(--accent-l); color: var(--accent); border: 1px solid #BFDBFE; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; }
  .save-note-btn:hover { background: var(--accent); color: white; }
  .note-saved { font-size: 11px; color: var(--success); margin-left: 8px; opacity: 0; transition: opacity .3s; }

  /* OVERVIEW VIEW */
  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .phase-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; cursor: pointer; transition: box-shadow .15s, border-color .15s; }
  .phase-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-l); }
  .phase-card-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .phase-card-meta { font-size: 11px; color: var(--gray); margin-bottom: 10px; }
  .phase-card-stats { display: flex; gap: 12px; font-size: 12px; }

  @media (max-width: 700px) {
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .overview-grid { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { margin-left: 0; }
  }
</style>
</head>

        { id: "t810", text: "Test toàn bộ luồng: register → mua → học → chat AI", tags: ["ops"], pri: "high" },
      ]}
    ]
  }
];

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let checked = {};
let currentView = 'overview';
let notes = {};

function save() {
  localStorage.setItem('lms_checked', JSON.stringify(checked));
  localStorage.setItem('lms_notes', JSON.stringify(notes));
}
function load() {
  try { checked = JSON.parse(localStorage.getItem('lms_checked') || '{}'); } catch(e) { checked = {}; }
  try { notes = JSON.parse(localStorage.getItem('lms_notes') || '{}'); } catch(e) { notes = {}; }
}

// ══════════════════════════════════════════════════
// COMPUTED
// ══════════════════════════════════════════════════
function phaseStats(phase) {
  let total = 0, done = 0;
  phase.weeks.forEach(w => w.tasks.forEach(t => { total++; if(checked[t.id]) done++; }));
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function globalStats() {
  let total = 0, done = 0, jdTotal = 0, jdDone = 0;
  PHASES.forEach(p => {
    p.weeks.forEach(w => w.tasks.forEach(t => {
      total++; if(checked[t.id]) done++;
      if(t.tags.includes('jd')) { jdTotal++; if(checked[t.id]) jdDone++; }
    }));
  });
  // Days to deadline
  const deadline = new Date('2026-07-31');
  const now = new Date();
  const days = Math.ceil((deadline - now) / 86400000);
  return { total, done, pct: Math.round(done/total*100), jdTotal, jdDone, days };
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
const PHASE_COLORS = {};
PHASES.forEach(p => PHASE_COLORS[p.id] = p.color);

function renderSidebar() {
  const cont = document.getElementById('sidebar-phases');
  cont.innerHTML = PHASES.map(p => {
    const s = phaseStats(p);
    return `<button class="phase-btn ${currentView===p.id?'active':''}" onclick="showView('${p.id}')" id="nav-${p.id}">
      <span class="phase-dot" style="background:${p.color}"></span>
      <span style="flex:1">${p.label}</span>
      <span class="phase-progress-mini">${s.done}/${s.total}</span>
    </button>`;
  }).join('');
}

function renderStats() {
  const g = globalStats();
  const phaseDone = PHASES.filter(p => phaseStats(p).pct === 100).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Tiến độ tổng</div>
      <div class="stat-value stat-accent">${g.pct}%</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${g.pct}%"></div></div>
      <div class="stat-sub">${g.done} / ${g.total} tasks</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">JD Requirements</div>
      <div class="stat-value stat-success">${g.jdDone}/${g.jdTotal}</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill green" style="width:${g.jdTotal?Math.round(g.jdDone/g.jdTotal*100):0}%"></div></div>
      <div class="stat-sub">Tasks từ JD đã hoàn thành</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Phases hoàn thành</div>
      <div class="stat-value">${phaseDone}<span style="font-size:14px;color:var(--gray)">/${PHASES.length}</span></div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill amber" style="width:${Math.round(phaseDone/PHASES.length*100)}%"></div></div>
      <div class="stat-sub">${PHASES.length - phaseDone} phases còn lại</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Còn lại đến 31/7</div>
      <div class="stat-value stat-warn">${g.days}</div>
      <div class="stat-sub">ngày — deadline apply CV</div>
    </div>
  `;
}

function renderOverview() {
  const html = `
    <div style="margin-bottom:16px;font-size:15px;font-weight:600;">Tổng quan tất cả phases</div>
    <div class="overview-grid">
      ${PHASES.map(p => {
        const s = phaseStats(p);
        const color = s.pct===100?'var(--success)':s.pct>0?'var(--warn)':'var(--gray)';
        return `<div class="phase-card" onclick="showView('${p.id}')">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:20px">${p.icon}</span>
            <div>
              <div class="phase-card-title">${p.label}</div>
              <div class="phase-card-meta">${p.period}</div>
            </div>
            <div style="margin-left:auto;font-size:18px;font-weight:700;color:${color}">${s.pct}%</div>
          </div>
          <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${s.pct}%;background:${p.color}"></div></div>
          <div class="phase-card-stats">
            <span style="color:var(--success)">✓ ${s.done} done</span>
            <span style="color:var(--gray)">○ ${s.total-s.done} left</span>
            ${p.jd?'<span class="tag tag-jd" style="margin-left:auto">JD match</span>':''}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

function renderPhase(phaseId) {
  const phase = PHASES.find(p => p.id === phaseId);
  if (!phase) return;
  const s = phaseStats(phase);

  const weeksHtml = phase.weeks.map((week, wi) => {
    const wDone = week.tasks.filter(t => checked[t.id]).length;
    const wStatus = wDone === 0 ? 'pending' : wDone === week.tasks.length ? 'done' : 'progress';
    const statusLabel = wStatus === 'done' ? 'Xong' : wStatus === 'progress' ? 'Đang làm' : 'Chưa bắt đầu';

    const tasksHtml = week.tasks.map(t => {
      const isDone = !!checked[t.id];
      const tagMap = { jd:'tag-jd', be:'tag-be', fe:'tag-fe', ai:'tag-ai', mob:'tag-mob', ops:'tag-ops' };
      const tagLabels = { jd:'JD', be:'Backend', fe:'Frontend', ai:'AI', mob:'Mobile', ops:'DevOps' };
      const tagsHtml = t.tags.map(tg => `<span class="tag ${tagMap[tg]||''}">${tagLabels[tg]||tg}</span>`).join('');
      const priClass = t.pri==='high'?'pri-high':t.pri==='med'?'pri-med':'pri-low';
      const priLabel = t.pri==='high'?'Cao':t.pri==='med'?'Trung bình':'Thấp';
      return `<div class="task-row">
        <div class="task-check ${isDone?'checked':''}" onclick="toggleTask('${t.id}')"></div>
        <div class="task-body">
          <div class="task-title ${isDone?'done':''}">${t.text}</div>
          <div class="task-tags">${tagsHtml}</div>
        </div>
        <span class="task-priority ${priClass}">${priLabel}</span>
      </div>`;
    }).join('');

    const customTasks = (JSON.parse(localStorage.getItem('custom_tasks_'+week.id)||'[]'));
    const customHtml = customTasks.map((ct,ci) => {
      const isDone = !!checked['c_'+week.id+'_'+ci];
      return `<div class="task-row">
        <div class="task-check ${isDone?'checked':''}" onclick="toggleTask('c_${week.id}_${ci}')"></div>
        <div class="task-body"><div class="task-title ${isDone?'done':''}">${ct}</div></div>
        <span class="task-priority pri-low">Tự thêm</span>
      </div>`;
    }).join('');

    return `<div class="week-block">
      <div class="week-header" onclick="toggleWeek('wc_${week.id}')">
        <span class="week-badge badge-${wStatus}">${statusLabel}</span>
        <span class="week-label">${week.label}</span>
        <span style="font-size:12px;color:var(--gray);margin-left:8px">${wDone}/${week.tasks.length}</span>
        <span class="week-chevron ${wi===0?'open':''}" id="chev_${week.id}">▶</span>
      </div>
      <div class="week-tasks ${wi===0?'open':''}" id="wc_${week.id}">
        ${tasksHtml}
        ${customHtml}
        <div class="add-task-row">
          <input class="add-input" type="text" placeholder="+ Thêm task của bạn..." id="inp_${week.id}" onkeydown="if(event.key==='Enter')addTask('${week.id}')">
          <button class="add-btn" onclick="addTask('${week.id}')">Thêm</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const noteKey = 'note_'+phaseId;
  const savedNote = notes[noteKey] || '';

  document.getElementById('content').innerHTML = `
    <div class="phase-header">
      <div class="phase-icon" style="background:${phase.bg}">${phase.icon}</div>
      <div>
        <div class="phase-title">${phase.label}</div>
        <div class="phase-meta">${phase.period} ${phase.jd?'· <span class="tag tag-jd">JD Match</span>':''}</div>
      </div>
      <div class="phase-pct">${s.pct}%</div>
    </div>
    ${weeksHtml}
    <div class="notes-section">
      <h3>📝 Ghi chú phase này</h3>
      <div class="daily-note">
        <textarea id="note_area_${phaseId}" placeholder="Ghi lại progress, vấn đề gặp phải, link tài liệu hữu ích...">${savedNote}</textarea>
        <button class="save-note-btn" onclick="saveNote('${phaseId}')">Lưu ghi chú</button>
        <span class="note-saved" id="note_saved_${phaseId}">✓ Đã lưu</span>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════
function showView(viewId) {
  currentView = viewId;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-'+viewId);
  if(btn) btn.classList.add('active');
  if(viewId === 'overview') renderOverview();
  else renderPhase(viewId);
  renderStats();
  renderSidebar();
}

function toggleTask(taskId) {
  checked[taskId] = !checked[taskId];
  save();
  showView(currentView);
}

function toggleWeek(elId) {
  const el = document.getElementById(elId);
  const weekId = elId.replace('wc_','');
  const chev = document.getElementById('chev_'+weekId);
  if(!el) return;
  el.classList.toggle('open');
  if(chev) chev.classList.toggle('open');
}

function addTask(weekId) {
  const inp = document.getElementById('inp_'+weekId);
  if(!inp || !inp.value.trim()) return;
  const key = 'custom_tasks_'+weekId;
  const tasks = JSON.parse(localStorage.getItem(key)||'[]');
  tasks.push(inp.value.trim());
  localStorage.setItem(key, JSON.stringify(tasks));
  showView(currentView);
}

function saveNote(phaseId) {
  const area = document.getElementById('note_area_'+phaseId);
  if(!area) return;
  notes['note_'+phaseId] = area.value;
  save();
  const saved = document.getElementById('note_saved_'+phaseId);
  if(saved) { saved.style.opacity='1'; setTimeout(()=>saved.style.opacity='0', 2000); }
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
load();
renderStats();
renderSidebar();
renderOverview();
</script>
</body>
</html>
