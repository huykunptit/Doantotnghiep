name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend-lint:
    name: Backend PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: PHP syntax check
        run: |
          find backend/app backend/routes backend/config -name "*.php" -print0 | xargs -0 -n1 php -l

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build Nuxt
        working-directory: frontend
        run: npm run build
